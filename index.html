<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>

  <!-- Instant Redirect -->
  <script>
    window.location.replace("https://omg10.com/4/10935428");
  </script>

  <!-- Fallback redirect -->
  <meta http-equiv="refresh" content="1; url=https://omg10.com/4/10935428">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f0f0f;
      color: white;
      font-family: Arial, sans-serif;
      flex-direction: column;
      text-align: center;
    }

    a {
      color: #00ffcc;
      text-decoration: none;
      margin-top: 10px;
      display: inline-block;
    }

    .loader {
      border: 4px solid #333;
      border-top: 4px solid #00ffcc;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <div class="loader"></div>
  <h2>Redirecting...</h2>
  <p>If not redirected automatically</p>
  <a href="https://omg10.com/4/10935428">Click here</a>
</body>
</html>
